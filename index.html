    <!-- Prevent theme flash before React hydrates -->
    <script>
      (function () {
        const t = localStorage.getItem("kip-theme") || "system";
        const dark =
          t === "dark" ||
          (t === "system" &&
            window.matchMedia("(prefers-color-scheme: dark)").matches);
        if (dark) document.documentElement.classList.add("dark");
      })();
    </script>
